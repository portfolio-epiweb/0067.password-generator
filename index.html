<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
	<title>Password Generator</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
		integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
		crossorigin="anonymous" referrerpolicy="no-referrer" />
	<link href="./css/root.css" rel="stylesheet">
	<link href="./css/main.css" rel="stylesheet">
	<link href="./css/media.css" rel="stylesheet">
	<script defer src="./js/app.js"></script>
</head>

<body>
	<div class="container">
		<h1 class="title">Password generator</h1>
		<div class="password-container">
			<input class="password" id="password" type="text" readonly>
			<i class="far fa-copy" id="copy-btn" title="Copy to clipboard"></i>
		</div>
		<div class="options">
			<div class="option">
				<label for="length">Password Lenght</label>
				<div class="range-container">
					<input id="length" type="range" min="6" max="24" value="12">
					<span id="length-value">12</span>
				</div>
			</div>
			<div class="option">
				<label for="uppercase">Include uppercase</label>
				<input type="checkbox" id="uppercase" checked>
			</div>
			<div class="option">
				<label for="lowercase">Include lowercase</label>
				<input type="checkbox" id="lowercase" checked>
			</div>
			<div class="option">
				<label for="numbers">Include numbers</label>
				<input type="checkbox" id="numbers" checked>
			</div>
			<div class="option">
				<label for="symbols">Include symbols</label>
				<input type="checkbox" id="symbols" checked>
			</div>
		</div>
		<button id="generate-btn">
			<i class="fas fa-key"></i>
			Generate Password
		</button>
		<div class="strength-container">
			<p>password strength: <span id="strength-label">Medium</span></p>
			<div class="strength-meter">
				<div class="strength-bar"></div>
			</div>
		</div>
	</div>

</body>


</html>
